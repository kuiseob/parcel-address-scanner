name: Build Windows EXE

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build EXE with PyInstaller
      run: |
        python build_windows_exe.py

    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: parcel-scanner-exe
        path: dist/parcel_scanner.exe
        retention-days: 30

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: dist/parcel_scanner.exe
        body: |
          # Parcel Address Scanner System Release

          ## Download
          `parcel_scanner.exe` - Standalone executable for Windows

          ## Installation
          1. Download the file
          2. Double-click to run
          3. Grant camera/printer permissions on first run

          ## Features
          - Real-time parcel address scanning with camera
          - AI-powered automatic recognition (postal code/receiver/phone)
          - SQLite database storage
          - QR code & barcode generation
          - Xprinter label printer support

          For more details, see the user manual PDF in the repository.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
